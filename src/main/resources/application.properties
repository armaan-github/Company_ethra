# ========================
# Server Configuration
# ========================
server.port=${PORT:8080}

# ========================
# MySQL DataSource
# ========================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/task_manager_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:Arm@n786**%}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ========================
# JPA / Hibernate
# ========================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ========================
# JWT Configuration
# ========================
app.jwt.secret=${JWT_SECRET:dGVhbVRhc2tNYW5hZ2VyU2VjcmV0S2V5Rm9ySldUQXV0aGVudGljYXRpb25Qcm9jZXNz}
app.jwt.expiration=${JWT_EXPIRATION:86400000}

# ========================
# CORS
# ========================
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200,http://localhost:3000}
